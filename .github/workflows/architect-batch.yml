name: Run Architect — Batch (All Approved Series)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — call Gemini but write nothing'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force:
        description: 'Force overwrite existing manifests'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  architect-batch:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout private engine repo
        uses: actions/checkout@v4
        with:
          repository: HABSGconsulting/fyf-guides-engine
          token: ${{ secrets.GH_PAT }}
          path: engine

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: engine/requirements.txt

      - name: Install dependencies
        run: pip install -r engine/requirements.txt

      - name: Configure Git
        working-directory: engine
        run: |
          git config user.name  "fyf-architect-bot"
          git config user.email "bot@fundyourfreedom.in"

      - name: Run Architect — All Approved Series
        working-directory: engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          FLAGS="--yes"
          if [ "${{ inputs.dry_run }}" = "true" ];  then FLAGS="$FLAGS --dry-run"; fi
          if [ "${{ inputs.force }}"   = "true" ];  then FLAGS="$FLAGS --force";   fi

          python scripts/architect.py --next $FLAGS
          git pull --rebase

          python scripts/architect.py --next $FLAGS
          git pull --rebase

          python scripts/architect.py --next $FLAGS
          git pull --rebase

      - name: Summary
        working-directory: engine
        run: |
          echo "=== Manifests generated ==="
          ls manifests/*.json 2>/dev/null || echo "(none — dry run or all already existed)"
          echo "=== Maps generated ==="
          ls manifests/*.md   2>/dev/null || echo "(none)"

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            await github.rest.issues.create({
              owner: 'HABSGconsulting',
              repo:  'fyf-guides-engine',
              title: `[Architect Batch] Run failed \u2014 ${new Date().toISOString().slice(0,10)}`,
              body:  `Architect batch run failed.\n\n[View logs](${context.serverUrl}/HABSGconsulting/fyf-guides-runner/actions/runs/${context.runId})`,
              labels: ['bug']
            })
