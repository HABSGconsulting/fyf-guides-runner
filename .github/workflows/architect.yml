name: Run Architect

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'next'
        type: choice
        options:
          - next
          - series
          - list
      series_id:
        description: 'Series ID — only used when mode=series (e.g. mind-over-markets)'
        required: false
        type: string
      dry_run:
        description: 'Dry run — call Gemini but write nothing'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      force:
        description: 'Force overwrite existing manifest'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  architect:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout private engine repo
        uses: actions/checkout@v4
        with:
          repository: HABSGconsulting/fyf-guides-engine
          token: ${{ secrets.GH_PAT }}
          path: engine

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: engine/requirements.txt

      - name: Install dependencies
        run: pip install -r engine/requirements.txt

      - name: Configure Git
        working-directory: engine
        run: |
          git config user.name  "fyf-architect-bot"
          git config user.email "bot@fundyourfreedom.in"

      - name: Run Architect
        working-directory: engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          FLAGS="--yes"
          if [ "${{ inputs.dry_run }}" = "true" ];  then FLAGS="$FLAGS --dry-run"; fi
          if [ "${{ inputs.force }}"   = "true" ];  then FLAGS="$FLAGS --force";   fi

          if [ "${{ inputs.mode }}" = "next" ]; then
            python scripts/architect.py --next $FLAGS

          elif [ "${{ inputs.mode }}" = "series" ]; then
            if [ -z "${{ inputs.series_id }}" ]; then
              echo "ERROR: series_id is required when mode=series"
              exit 1
            fi
            python scripts/architect.py --series "${{ inputs.series_id }}" $FLAGS

          elif [ "${{ inputs.mode }}" = "list" ]; then
            python scripts/architect.py --list
          fi

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            await github.rest.issues.create({
              owner: 'HABSGconsulting',
              repo:  'fyf-guides-engine',
              title: `[Architect] Run failed \u2014 ${new Date().toISOString().slice(0,10)}`,
              body:  `Architect run failed (mode: ${{ inputs.mode }}, series: ${{ inputs.series_id || 'N/A' }}).\n\n[View logs](${context.serverUrl}/HABSGconsulting/fyf-guides-runner/actions/runs/${context.runId})`,
              labels: ['bug']
            })
